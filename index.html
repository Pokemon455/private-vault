<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,sans-serif;background:#0d0d0d;color:#eee;height:100vh;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#1a0a2e,#2d1060);padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #7c3aed;}
.logo{background:#7c3aed;color:#fff;font-weight:900;font-size:13px;padding:4px 10px;border-radius:6px;letter-spacing:1px;}
header h1{font-size:18px;color:#a78bfa;font-weight:600;}
.badge{margin-left:auto;border:1px solid #7c3aed;color:#a78bfa;padding:4px 12px;border-radius:20px;font-size:11px;}
#chat{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
#chat::-webkit-scrollbar{width:5px;}
#chat::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:3px;}
.msg{max-width:82%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;word-break:break-word;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.user{align-self:flex-end;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;font-weight:500;border-bottom-right-radius:4px;}
.ai{align-self:flex-start;background:#1a1a2e;border:1px solid #2d2d5e;border-bottom-left-radius:4px;min-width:200px;}
.ai .sender{font-size:11px;color:#a78bfa;margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:6px;}
.tool-card{background:#0f0f1a;border:1px solid #2d2d5e;border-radius:10px;padding:10px 14px;margin:6px 0;font-size:12px;}
.tool-card .tool-name{color:#7c3aed;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.tool-card .tool-result{color:#888;line-height:1.5;max-height:120px;overflow-y:auto;}
.tool-card .tool-result::-webkit-scrollbar{width:3px;}
.tool-card .tool-result::-webkit-scrollbar-thumb{background:#7c3aed;}
.poster{width:60px;height:90px;border-radius:6px;object-fit:cover;float:right;margin:0 0 8px 12px;border:2px solid #7c3aed;}
.rating-badge{display:inline-block;background:#7c3aed22;border:1px solid #7c3aed;color:#a78bfa;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px;}
.typing{display:flex;gap:6px;align-items:center;padding:14px 16px;background:#1a1a2e;border:1px solid #2d2d5e;border-radius:14px;border-bottom-left-radius:4px;align-self:flex-start;}
.typing span{width:7px;height:7px;background:#7c3aed;border-radius:50%;display:inline-block;animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}
#input-area{padding:14px 24px;background:#111;border-top:1px solid #1e1e1e;display:flex;gap:10px;align-items:flex-end;}
#inp{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:11px 15px;color:#eee;font-size:14px;resize:none;outline:none;min-height:46px;max-height:120px;font-family:inherit;transition:border-color .2s;}
#inp:focus{border-color:#7c3aed;}
#inp::placeholder{color:#555;}
#sendBtn{background:#7c3aed;border:none;color:#fff;font-weight:700;padding:11px 20px;border-radius:12px;cursor:pointer;font-size:14px;min-width:80px;transition:all .2s;}
#sendBtn:hover{background:#6d28d9;}
#sendBtn:disabled{background:#333;color:#666;cursor:not-allowed;}
.welcome{text-align:center;margin:auto;padding:30px;}
.welcome h2{color:#a78bfa;font-size:22px;margin-bottom:10px;}
.welcome p{color:#555;font-size:13px;line-height:1.8;}
.welcome .tools-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;}
.welcome .tool-pill{background:#1a1a2e;border:1px solid #7c3aed44;color:#a78bfa;padding:5px 12px;border-radius:20px;font-size:12px;}
.errmsg{align-self:center;background:rgba(255,60,60,.1);border:1px solid #f44;color:#f88;padding:10px 14px;border-radius:8px;font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="logo">&#127916;</div>
  <h1>Movie Agent</h1>
  <span class="badge">AI + TMDB + OMDB</span>
</header>
<div id="chat">
  <div class="welcome">
    <h2>&#127775; Movie Agent</h2>
    <p>Mujhse koi bhi movie ya TV show ke baare mein poocho.<br>Main real-time data fetch karke jawab dunga!</p>
    <div class="tools-list">
      <span class="tool-pill">&#128269; Movie Search</span>
      <span class="tool-pill">&#11088; Ratings (IMDB/RT)</span>
      <span class="tool-pill">&#127871; Cast & Crew</span>
      <span class="tool-pill">&#128203; Plot Summary</span>
      <span class="tool-pill">&#128200; Trending Movies</span>
      <span class="tool-pill">&#127916; Recommendations</span>
    </div>
  </div>
</div>
<div id="input-area">
  <textarea id="inp" placeholder="e.g. Tell me about Inception, Top 5 action movies, Who directed Interstellar..." rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>
<script>
(function(){
  var NVIDIA_KEY="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";
  var NVIDIA_API="https://integrate.api.nvidia.com/v1/chat/completions";
  var NVIDIA_MODEL="openai/gpt-oss-20b";
  var TMDB_KEY="2dca580c2a14b55200e784d157207b4d"; // free public demo key
  var OMDB_KEY="trilogy"; // free public key

  var msgs=[];
  var busy=false;
  var chatEl=document.getElementById("chat");
  var inpEl=document.getElementById("inp");
  var btnEl=document.getElementById("sendBtn");

  // Tool definitions
  var TOOLS=[
    {
      name:"search_movie",
      description:"Search for a movie or TV show by title. Returns basic info, ratings, poster.",
      parameters:{type:"object",properties:{title:{type:"string",description:"Movie or TV show title"},year:{type:"string",description:"Release year (optional)"}},required:["title"]}
    },
    {
      name:"get_trending",
      description:"Get currently trending movies. Returns top 10 trending movies this week.",
      parameters:{type:"object",properties:{},required:[]}
    },
    {
      name:"get_movie_details",
      description:"Get detailed info about a movie including cast, director, runtime, ratings from IMDB and Rotten Tomatoes.",
      parameters:{type:"object",properties:{title:{type:"string",description:"Exact movie title"}},required:["title"]}
    },
    {
      name:"get_recommendations",
      description:"Get movie recommendations similar to a given movie.",
      parameters:{type:"object",properties:{title:{type:"string",description:"Movie title to base recommendations on"}},required:["title"]}
    }
  ];

  var SYSTEM_PROMPT=`You are a helpful Movie Agent. You have access to real movie data tools.
When user asks about movies, ALWAYS use the appropriate tool first to get real data, then answer based on that data.
Be concise, informative, and format your response nicely. Use emojis where appropriate.
After getting tool results, summarize the key info clearly.`;

  btnEl.addEventListener("click",go);
  inpEl.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();go();}});
  inpEl.addEventListener("input",function(){inpEl.style.height="auto";inpEl.style.height=Math.min(inpEl.scrollHeight,120)+"px";});

  // Tool execution functions
  async function execTool(name, args){
    if(name==="search_movie"){
      var q=encodeURIComponent(args.title);
      var yr=args.year?"&year="+args.year:"";
      var res=await fetch("https://api.themoviedb.org/3/search/movie?api_key="+TMDB_KEY+"&query="+q+yr+"&page=1");
      var data=await res.json();
      var results=(data.results||[]).slice(0,3).map(function(m){
        return {title:m.title,year:(m.release_date||"").slice(0,4),rating:m.vote_average,overview:(m.overview||"").slice(0,150),poster:m.poster_path?"https://image.tmdb.org/t/p/w200"+m.poster_path:null,id:m.id};
      });
      return JSON.stringify(results);
    }
    if(name==="get_trending"){
      var res=await fetch("https://api.themoviedb.org/3/trending/movie/week?api_key="+TMDB_KEY);
      var data=await res.json();
      var results=(data.results||[]).slice(0,10).map(function(m,i){
        return {rank:i+1,title:m.title,year:(m.release_date||"").slice(0,4),rating:m.vote_average,poster:m.poster_path?"https://image.tmdb.org/t/p/w200"+m.poster_path:null};
      });
      return JSON.stringify(results);
    }
    if(name==="get_movie_details"){
      // OMDB for detailed ratings
      var t=encodeURIComponent(args.title);
      var res=await fetch("https://www.omdbapi.com/?apikey="+OMDB_KEY+"&t="+t+"&plot=full");
      var omdb=await res.json();
      // TMDB for cast
      var res2=await fetch("https://api.themoviedb.org/3/search/movie?api_key="+TMDB_KEY+"&query="+t);
      var tmdbSearch=await res2.json();
      var cast=[];
      if(tmdbSearch.results&&tmdbSearch.results[0]){
        var mid=tmdbSearch.results[0].id;
        var res3=await fetch("https://api.themoviedb.org/3/movie/"+mid+"/credits?api_key="+TMDB_KEY);
        var credits=await res3.json();
        cast=(credits.cast||[]).slice(0,5).map(function(c){return c.name;});
      }
      var ratings={};
      (omdb.Ratings||[]).forEach(function(r){ratings[r.Source]=r.Value;});
      return JSON.stringify({title:omdb.Title,year:omdb.Year,director:omdb.Director,cast:cast,runtime:omdb.Runtime,genre:omdb.Genre,plot:omdb.Plot,ratings:ratings,awards:omdb.Awards,poster:omdb.Poster!=="N/A"?omdb.Poster:null,boxOffice:omdb.BoxOffice});
    }
    if(name==="get_recommendations"){
      var t=encodeURIComponent(args.title);
      var res=await fetch("https://api.themoviedb.org/3/search/movie?api_key="+TMDB_KEY+"&query="+t);
      var search=await res.json();
      if(!search.results||!search.results[0]) return JSON.stringify([]);
      var mid=search.results[0].id;
      var res2=await fetch("https://api.themoviedb.org/3/movie/"+mid+"/recommendations?api_key="+TMDB_KEY);
      var data=await res2.json();
      var recs=(data.results||[]).slice(0,6).map(function(m){
        return {title:m.title,year:(m.release_date||"").slice(0,4),rating:m.vote_average,overview:(m.overview||"").slice(0,100)};
      });
      return JSON.stringify(recs);
    }
    return JSON.stringify({error:"Unknown tool"});
  }

  function addMsg(role,content,toolCalls){
    var w=document.querySelector(".welcome");if(w)w.remove();
    var d=document.createElement("div");
    if(role==="user"){
      d.className="msg user";d.textContent=content;
    }else if(role==="err"){
      d.className="errmsg";d.textContent="Error: "+content;
    }else{
      d.className="msg ai";
      var sender=document.createElement("div");
      sender.className="sender";sender.innerHTML="&#127916; Movie Agent";
      d.appendChild(sender);
      // Tool cards
      if(toolCalls&&toolCalls.length>0){
        toolCalls.forEach(function(tc){
          var card=document.createElement("div");
          card.className="tool-card";
          var icons={"search_movie":"&#128269;","get_trending":"&#128200;","get_movie_details":"&#11088;","get_recommendations":"&#127916;"};
          var icon=icons[tc.name]||"&#128295;";
          card.innerHTML="<div class='tool-name'>"+icon+" "+tc.name.replace(/_/g," ")+"</div><div class='tool-result'>"+formatToolResult(tc.name,tc.result)+"</div>";
          d.appendChild(card);
        });
      }
      var text=document.createElement("div");
      text.style.marginTop=toolCalls&&toolCalls.length?"10px":"0";
      text.innerHTML=content.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>").replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
      d.appendChild(text);
    }
    chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
  }

  function formatToolResult(name,result){
    try{
      var data=JSON.parse(result);
      if(name==="get_trending"&&Array.isArray(data)){
        return data.slice(0,5).map(function(m){return m.rank+". "+m.title+" ("+m.year+") &#11088;"+m.rating.toFixed(1);}).join("<br>");
      }
      if(name==="search_movie"&&Array.isArray(data)){
        return data.map(function(m){return "&#127916; "+m.title+" ("+m.year+") &#11088;"+m.rating.toFixed(1);}).join("<br>");
      }
      if(name==="get_movie_details"&&data.title){
        var html=data.title+" ("+data.year+")";
        if(data.director) html+="<br>&#127775; "+data.director;
        if(data.ratings&&data.ratings["Internet Movie Database"]) html+="<br>&#11088; IMDB: "+data.ratings["Internet Movie Database"];
        if(data.ratings&&data.ratings["Rotten Tomatoes"]) html+="<br>&#127813; RT: "+data.ratings["Rotten Tomatoes"];
        return html;
      }
      if(name==="get_recommendations"&&Array.isArray(data)){
        return data.map(function(m){return "&#127916; "+m.title+" ("+m.year+")";}).join("<br>");
      }
      return JSON.stringify(data).slice(0,200);
    }catch(e){return result.slice?result.slice(0,200):String(result);}
  }

  function showTyping(){var d=document.createElement("div");d.className="typing";d.id="ntyp";d.innerHTML="<span></span><span></span><span></span>";chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;}
  function hideTyping(){var t=document.getElementById("ntyp");if(t)t.remove();}

  async function go(){
    var text=inpEl.value.trim();if(!text||busy)return;
    busy=true;btnEl.disabled=true;btnEl.textContent="...";
    inpEl.value="";inpEl.style.height="auto";
    addMsg("user",text);
    msgs.push({role:"user",content:text});
    showTyping();

    try{
      // Agentic loop
      var loopMsgs=[{role:"system",content:SYSTEM_PROMPT}].concat(msgs);
      var collectedToolCalls=[];
      var finalText="";
      var maxSteps=5;

      for(var step=0;step<maxSteps;step++){
        var body={
          model:NVIDIA_MODEL,
          messages:loopMsgs,
          max_tokens:1024,
          temperature:0.7,
          tools:TOOLS,
          tool_choice:"auto"
        };
        var res=await fetch(NVIDIA_API,{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+NVIDIA_KEY},
          body:JSON.stringify(body)
        });
        var data=await res.json();
        if(!res.ok){throw new Error((data.error&&data.error.message)||"API error "+res.status);}

        var choice=data.choices[0];
        var msg=choice.message;
        loopMsgs.push(msg);

        // If tool calls
        if(msg.tool_calls&&msg.tool_calls.length>0){
          for(var i=0;i<msg.tool_calls.length;i++){
            var tc=msg.tool_calls[i];
            var tName=tc.function.name;
            var tArgs=JSON.parse(tc.function.arguments||"{}");
            var tResult=await execTool(tName,tArgs);
            collectedToolCalls.push({name:tName,args:tArgs,result:tResult});
            loopMsgs.push({role:"tool",tool_call_id:tc.id,content:tResult});
          }
        }else{
          // Final answer
          finalText=msg.content||"";
          break;
        }
      }

      hideTyping();
      msgs.push({role:"assistant",content:finalText});
      addMsg("ai",finalText,collectedToolCalls);

    }catch(e){
      hideTyping();
      addMsg("err",e.message||"Something went wrong");
    }

    busy=false;btnEl.disabled=false;btnEl.textContent="Send";inpEl.focus();
  }
})();
</script>
</body>
</html>
