<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVIDIA AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,sans-serif;background:#0a0a0a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #76b900;}
.logo{background:#76b900;color:#000;font-weight:900;font-size:14px;padding:4px 10px;border-radius:4px;letter-spacing:1px;}
header h1{font-size:18px;color:#76b900;font-weight:600;}
.badge{margin-left:auto;border:1px solid #76b900;color:#76b900;padding:4px 12px;border-radius:20px;font-size:12px;}
#chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
#chat::-webkit-scrollbar{width:5px;}
#chat::-webkit-scrollbar-thumb{background:#76b900;border-radius:3px;}
.msg{max-width:78%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;word-break:break-word;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.user{align-self:flex-end;background:#76b900;color:#000;font-weight:600;border-bottom-right-radius:4px;}
.ai{align-self:flex-start;background:#1a1a2e;border:1px solid #2a2a4e;border-bottom-left-radius:4px;}
.ai .sender{font-size:11px;color:#76b900;margin-bottom:6px;font-weight:700;letter-spacing:.5px;}
.typing{display:flex;gap:6px;align-items:center;padding:14px 16px;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:12px;border-bottom-left-radius:4px;align-self:flex-start;}
.typing span{width:8px;height:8px;background:#76b900;border-radius:50%;display:inline-block;animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-8px);}}
#input-area{padding:16px 24px;background:#111;border-top:1px solid #222;display:flex;gap:12px;align-items:flex-end;}
#inp{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px 16px;color:#e0e0e0;font-size:14px;resize:none;outline:none;min-height:48px;max-height:130px;font-family:inherit;transition:border-color .2s;}
#inp:focus{border-color:#76b900;}
#inp::placeholder{color:#555;}
#sendBtn{background:#76b900;border:none;color:#000;font-weight:700;padding:13px 22px;border-radius:12px;cursor:pointer;font-size:15px;min-width:82px;transition:all .2s;}
#sendBtn:hover{background:#8fd400;transform:scale(1.03);}
#sendBtn:disabled{background:#333;color:#666;cursor:not-allowed;transform:none;}
.welcome{text-align:center;margin:auto;padding:30px;}
.welcome h2{color:#76b900;font-size:24px;margin-bottom:10px;}
.welcome p{color:#555;font-size:13px;}
.errmsg{align-self:center;background:rgba(255,60,60,.12);border:1px solid #f44;color:#f88;padding:10px 16px;border-radius:8px;font-size:13px;max-width:90%;}
</style>
</head>
<body>
<header>
  <div class="logo">NVIDIA</div>
  <h1>AI Chat</h1>
  <span class="badge">gpt-oss-20b</span>
</header>
<div id="chat">
  <div class="welcome">
    <h2>NVIDIA AI Chat</h2>
    <p>Powered by NVIDIA Integrate API &mdash; gpt-oss-20b</p>
  </div>
</div>
<div id="input-area">
  <textarea id="inp" placeholder="Kuch bhi poocho..." rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>
<script>
(function(){
  var NKEY="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";
  var NAPI="https://integrate.api.nvidia.com/v1/chat/completions";
  var NMODEL="openai/gpt-oss-20b";
  var msgs=[],busy=false;
  var chatEl=document.getElementById("chat");
  var inpEl=document.getElementById("inp");
  var btnEl=document.getElementById("sendBtn");

  btnEl.addEventListener("click",go);
  inpEl.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();go();}});
  inpEl.addEventListener("input",function(){inpEl.style.height="auto";inpEl.style.height=Math.min(inpEl.scrollHeight,130)+"px";});

  function addMsg(role,text){
    var w=document.querySelector(".welcome");if(w)w.remove();
    var d=document.createElement("div");
    if(role==="user"){d.className="msg user";d.textContent=text;}
    else if(role==="err"){d.className="errmsg";d.textContent="Error: "+text;}
    else{
      d.className="msg ai";
      var s=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/
/g,"<br>");
      d.innerHTML="<div class='sender'>NVIDIA AI</div>"+s;
    }
    chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
  }

  function showTyping(){var d=document.createElement("div");d.className="typing";d.id="ntyp";d.innerHTML="<span></span><span></span><span></span>";chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;}
  function hideTyping(){var t=document.getElementById("ntyp");if(t)t.remove();}

  function go(){
    var text=inpEl.value.trim();if(!text||busy)return;
    busy=true;btnEl.disabled=true;btnEl.textContent="...";
    inpEl.value="";inpEl.style.height="auto";
    addMsg("user",text);msgs.push({role:"user",content:text});showTyping();

    fetch(NAPI,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+NKEY},
      body:JSON.stringify({model:NMODEL,messages:msgs,max_tokens:1024,temperature:0.7})
    })
    .then(function(res){return res.text().then(function(t){try{return{ok:res.ok,data:JSON.parse(t)};}catch(e){return{ok:false,data:{error:{message:t.substring(0,120)}}};}});})
    .then(function(r){
      hideTyping();
      if(!r.ok){addMsg("err",(r.data.error&&r.data.error.message)?r.data.error.message:"HTTP error");}
      else{var rep=r.data.choices&&r.data.choices[0]&&r.data.choices[0].message?r.data.choices[0].message.content:"No response";msgs.push({role:"assistant",content:rep});addMsg("ai",rep);}
    })
    .catch(function(e){hideTyping();addMsg("err",e.message||"Network error");})
    .finally(function(){busy=false;btnEl.disabled=false;btnEl.textContent="Send";inpEl.focus();});
  }
})();
</script>
</body>
</html>
