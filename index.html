<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .chat-container {
    width: 400px;
    height: 600px;
    background: #1a1a2e;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
  }
  .chat-header {
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bot-avatar {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .chat-header h2 { color: #fff; font-size: 18px; }
  .chat-header p { color: rgba(255,255,255,0.7); font-size: 12px; }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .bot-msg {
    background: #16213e;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    border: 1px solid #00d4ff22;
  }
  .user-msg {
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    color: #fff;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
  }
  .chat-input {
    padding: 16px;
    background: #16213e;
    display: flex;
    gap: 10px;
    border-top: 1px solid #ffffff11;
  }
  .chat-input input {
    flex: 1;
    background: #0f0f1a;
    border: 1px solid #00d4ff33;
    color: #fff;
    padding: 10px 14px;
    border-radius: 25px;
    font-size: 14px;
    outline: none;
    transition: border 0.3s;
  }
  .chat-input input:focus { border-color: #00d4ff; }
  .chat-input button {
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    border: none;
    color: #fff;
    width: 42px; height: 42px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: transform 0.2s;
  }
  .chat-input button:hover { transform: scale(1.1); }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div>
      <h2>AI Assistant</h2>
      <p>Always online</p>
    </div>
  </div>
  <div class="chat-messages" id="messages">
    <div class="message bot-msg">👋 Hello! I am your AI Assistant. Ask me anything!</div>
  </div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const rules = [
    { words: ["hello","hi","hey","salam","helo"], reply: "👋 Hello! How can I help you today?" },
    { words: ["how are you","how r u","kaisa","kya haal"], reply: "😊 I am doing great! Thanks for asking. How about you?" },
    { words: ["your name","who are you","what are you"], reply: "🤖 I am a Rule-Based AI Chatbot built with HTML, CSS & JS!" },
    { words: ["help","madad","support"], reply: "🆘 I can help with greetings, time, jokes, facts & general questions!" },
    { words: ["time","waqt","clock"], reply: () => "🕐 Current time: <b>" + new Date().toLocaleTimeString() + "</b>" },
    { words: ["date","today","aaj"], reply: () => "📅 Today is: <b>" + new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) + "</b>" },
    { words: ["joke","funny","mazak"], reply: "😂 Why do programmers prefer dark mode?<br>Because <b>light attracts bugs!</b> 🐛" },
    { words: ["python","coding","programming","code"], reply: "🐍 Python is amazing for AI, ML & automation. Are you learning it?" },
    { words: ["ai","machine learning","deep learning","ml"], reply: "🧠 AI & ML are the future! I myself am a tiny AI. Are you building something?" },
    { words: ["weather","mausam","rain"], reply: "☁️ I don't have live weather data. Check Google for real-time updates!" },
    { words: ["thanks","thank you","shukriya","shukria"], reply: "🙏 You're welcome! Happy to help anytime." },
    { words: ["bye","goodbye","khuda hafiz","alvida"], reply: "👋 Goodbye! Have a great day! 😊" },
    { words: ["who made you","creator","developer","kisne banaya"], reply: "👨‍💻 Built by <b>Arbaz</b> — AI/ML Developer. GitHub: <a href='https://github.com/Pokemon455' target='_blank' style='color:#00d4ff'>Pokemon455</a>" },
    { words: ["fact","fun fact","interesting"], reply: "🌟 Fun Fact: The first computer bug was an actual <b>moth</b> found in a Harvard computer in 1947! 🦗" },
  ];

  function getReply(msg) {
    const lower = msg.toLowerCase();
    for (const rule of rules) {
      if (rule.words.some(w => lower.includes(w))) {
        return typeof rule.reply === "function" ? rule.reply() : rule.reply;
      }
    }
    return "🤔 I didn't understand that. Try asking about time, jokes, AI, or just say <b>hi</b>!";
  }

  function addMessage(text, isUser) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message " + (isUser ? "user-msg" : "bot-msg");
    div.innerHTML = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, true);
    input.value = "";
    setTimeout(() => addMessage(getReply(text), false), 400);
  }
</script>
</body>
</html>
