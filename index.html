<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; font-family:'Space Mono',monospace; height:100vh; display:flex; justify-content:center; align-items:center; }
  .box { width:420px; background:#111; border:1px solid #222; border-radius:12px; overflow:hidden; }
  .head { padding:16px 20px; border-bottom:1px solid #222; color:#fff; display:flex; align-items:center; gap:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#00ff88; animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .msgs { height:420px; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .msg { padding:12px 16px; border-radius:10px; max-width:85%; font-size:0.82rem; line-height:1.6; }
  .user { background:#1a1a1a; color:#fff; align-self:flex-end; border:1px solid #333; }
  .bot { background:#0d1f17; color:#00ff88; align-self:flex-start; border:1px solid #1a3a2a; }
  .typing { color:#555; font-size:0.8rem; padding:0 20px 8px; height:20px; }
  .inp-area { display:flex; gap:8px; padding:14px; border-top:1px solid #222; }
  input { flex:1; padding:10px 14px; background:#1a1a1a; border:1px solid #333; border-radius:8px; color:#fff; font-family:'Space Mono',monospace; font-size:0.82rem; outline:none; }
  input:focus { border-color:#00ff88; }
  button { padding:10px 16px; background:#00ff88; color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:700; }
  button:disabled { background:#333; color:#666; cursor:not-allowed; }
</style>
</head>
<body>
<div class="box">
  <div class="head"><div class="dot"></div>AI Chat</div>
  <div class="msgs" id="msgs"><div class="msg bot">Hello! How can I help you? 😊</div></div>
  <div class="typing" id="typing"></div>
  <div class="inp-area">
    <input id="inp" type="text" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter')send()"/>
    <button id="btn" onclick="send()">Send</button>
  </div>
</div>
<script>
const history = [];
async function send() {
  const inp = document.getElementById('inp'), msgs = document.getElementById('msgs');
  const btn = document.getElementById('btn'), typing = document.getElementById('typing');
  const text = inp.value.trim();
  if (!text) return;
  msgs.innerHTML += `<div class="msg user">${text}</div>`;
  history.push({role:'user', content: text});
  inp.value = ''; btn.disabled = true; typing.textContent = 'AI is typing...';
  msgs.scrollTop = msgs.scrollHeight;
  try {
    const res = await fetch('/.netlify/functions/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({messages: history}) });
    const data = await res.json();
    history.push({role:'assistant', content: data.reply});
    msgs.innerHTML += `<div class="msg bot">${data.reply}</div>`;
  } catch(e) { msgs.innerHTML += `<div class="msg bot">Error: ${e.message}</div>`; }
  typing.textContent = ''; btn.disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
